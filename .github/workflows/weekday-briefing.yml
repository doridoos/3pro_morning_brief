name: Weekday Sampro Morning Briefing

on:
  workflow_dispatch:
    inputs:
      briefing_date:
        description: "Briefing date in KST, for example 2026-06-18. Use today for the current KST date."
        required: false
        default: "today"
  # schedule:
  #   # 22:10 UTC = 07:10 KST, Sunday-Thursday UTC = Monday-Friday KST
  #   - cron: "10 22 * * 0-4"

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TEXT_MODEL: ${{ vars.OPENAI_TEXT_MODEL || 'gpt-4.1-mini' }}
          OPENAI_TTS_MODEL: ${{ vars.OPENAI_TTS_MODEL || 'gpt-4o-mini-tts' }}
          OPENAI_TTS_VOICE: ${{ vars.OPENAI_TTS_VOICE || 'alloy' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.sampro_brief.cli --date "${{ github.event.inputs.briefing_date || 'today' }}" --collect-archive-transcripts --analyze-openai --create-tts --send-telegram
      - name: Save briefing files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sampro-briefing-${{ github.run_id }}
          path: briefings/
          if-no-files-found: warn
          retention-days: 14
